<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 640" width="1600" height="640" role="img" aria-label="A natural-language paint request becoming a typed query, then a deterministic Delta-E color search scored by an objective eval">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d2021"/>
      <stop offset="1" stop-color="#282828"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b8bb26"/>
      <stop offset="1" stop-color="#8ec07c"/>
    </linearGradient>
    <style>
      .mono { font-family: "SFMono-Regular", "JetBrains Mono", "Fira Code", Menlo, Consolas, monospace; }
      .t  { fill: #ebdbb2; } .dim{ fill: #928374; }
      .gn { fill: #b8bb26; } .rd { fill: #fb4934; } .yl { fill: #fabd2f; }
      .aq { fill: #8ec07c; } .or { fill: #fe8019; } .bl { fill: #83a598; } .pu { fill: #d3869b; }
    </style>
  </defs>

  <rect width="1600" height="640" rx="24" fill="url(#bg)"/>
  <rect x="1" y="1" width="1598" height="638" rx="23" fill="none" stroke="#3c3836" stroke-width="2"/>

  <!-- chrome -->
  <circle cx="48" cy="44" r="9" class="rd"/>
  <circle cx="80" cy="44" r="9" class="yl"/>
  <circle cx="112" cy="44" r="9" class="gn"/>
  <text x="148" y="50" class="mono dim" font-size="22">paint_match.py — PydanticAI · Logfire · pydantic-evals</text>

  <!-- LEFT: NL request -> typed query -->
  <g class="mono">
    <text x="48" y="124" class="dim" font-size="20">// natural language in</text>
    <rect x="48" y="140" width="600" height="78" rx="12" fill="#252221" stroke="#504945" stroke-width="2"/>
    <text x="68" y="174" class="pu" font-size="23">"something like the dusty sage on my</text>
    <text x="68" y="204" class="pu" font-size="23"> north wall, but a touch warmer"</text>

    <text x="324" y="250" class="dim" font-size="30" text-anchor="middle">│</text>
    <text x="324" y="252" class="aq" font-size="17" text-anchor="middle">▼ PydanticAI agent</text>

    <text x="48" y="296" class="dim" font-size="20">// typed + validated query (Pydantic)</text>
    <rect x="48" y="312" width="600" height="168" rx="12" fill="#252221" stroke="#504945" stroke-width="2"/>
    <text x="68" y="346" class="t" font-size="22">PaintQuery(</text>
    <text x="100" y="378" class="t" font-size="22">base_hex=<tspan class="aq">"#9CA488"</tspan>,</text>
    <text x="100" y="410" class="t" font-size="22">warmth=<tspan class="yl">+0.3</tspan>, lightness=<tspan class="yl">0.0</tspan>,</text>
    <text x="100" y="442" class="t" font-size="22">count=<tspan class="yl">3</tspan>,</text>
    <text x="68" y="470" class="t" font-size="22">)</text>

    <text x="48" y="556" class="or" font-size="40" font-weight="700">ΔE — OBJECTIVE EVALS</text>
    <text x="48" y="596" class="dim" font-size="22">when you have ground truth, you don't need a judge</text>
  </g>

  <!-- arrow to deterministic search -->
  <line x1="664" y1="396" x2="744" y2="396" stroke="#665c54" stroke-width="3"/>
  <polygon points="744,386 768,396 744,406" fill="#665c54"/>
  <text x="716" y="378" class="mono dim" font-size="15" text-anchor="middle">LAB</text>

  <!-- RIGHT: deterministic Delta-E search results -->
  <g class="mono">
    <rect x="800" y="96" width="752" height="392" rx="16" fill="#252221" stroke="#3c3836" stroke-width="2"/>
    <text x="828" y="138" class="dim" font-size="20">deterministic CIEDE2000 nearest-neighbor · threshold ≤ 5.0 ΔE</text>

    <!-- source swatch -->
    <rect x="828" y="160" width="72" height="72" rx="10" fill="#9EA68A" stroke="#504945" stroke-width="2"/>
    <text x="916" y="190" class="t" font-size="22">source  #9EA68A</text>
    <text x="916" y="218" class="dim" font-size="18">LAB (66.8, −7.9, 13.6)</text>

    <line x1="828" y1="256" x2="1524" y2="256" stroke="#3c3836" stroke-width="2"/>

    <!-- ranked matches -->
    <rect x="828" y="278" width="56" height="56" rx="9" fill="#9CA488" stroke="#504945" stroke-width="2"/>
    <text x="904" y="304" class="t" font-size="23">Dusty Sage</text>
    <text x="904" y="328" class="dim" font-size="18">#9CA488</text>
    <text x="1290" y="316" class="gn" font-size="26">ΔE 0.61</text>
    <text x="1470" y="316" class="gn" font-size="26">✓</text>

    <rect x="828" y="346" width="56" height="56" rx="9" fill="#7E8466" stroke="#504945" stroke-width="2"/>
    <text x="904" y="372" class="t" font-size="23">Mossy Stone</text>
    <text x="904" y="396" class="dim" font-size="18">#7E8466</text>
    <text x="1290" y="384" class="dim" font-size="26">ΔE 11.35</text>
    <text x="1470" y="384" class="rd" font-size="26">✗</text>

    <rect x="828" y="414" width="56" height="56" rx="9" fill="#F3E5B5" stroke="#504945" stroke-width="2"/>
    <text x="904" y="440" class="t" font-size="23">Buttercream</text>
    <text x="904" y="464" class="dim" font-size="18">#F3E5B5</text>
    <text x="1290" y="452" class="dim" font-size="26">ΔE 19.26</text>
    <text x="1470" y="452" class="rd" font-size="26">✗</text>
  </g>

  <!-- score bar -->
  <g class="mono">
    <text x="800" y="544" class="t" font-size="26">golden-set accuracy</text>
    <rect x="1110" y="524" width="320" height="24" rx="12" fill="#3c3836"/>
    <rect x="1110" y="524" width="320" height="24" rx="12" fill="url(#bar)"/>
    <text x="1448" y="545" class="gn" font-size="26">100%</text>
    <text x="800" y="586" class="dim" font-size="20">8/8 within ΔE bound · </text>
    <text x="1058" y="586" class="gn" font-size="20">PASS — a real number, no judge</text>
  </g>
</svg>
